name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Lint once (OS-independent).
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@4d1965c914248e48d40c19de54b5cba84953a06 # v1.10.0
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # Test on three operating systems (one default arch each).
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@4d1965c914248e48d40c19de54b5cba84953a06 # v1.10.0
        with:
          toolchain: stable

      - name: Run tests
        run: cargo test --all-features

      - name: Build release binary
        run: cargo build --release

      - name: Smoke test CLI
        shell: bash
        run: |
          cargo run --release --quiet -- --version
          cargo run --release --quiet -- --max-depth 1 --format json src | head -1
